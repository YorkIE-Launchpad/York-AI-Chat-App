changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions
  categories:
    - title: '🚀 Features'
      labels:
        - enhancement
        - feat
    - title: '🐛 Bug Fixes'
      labels:
        - bug
        - fix
    - title: '🏗 Refactoring'
      labels:
        - refactor
    - title: '⚡ Performance'
      labels:
        - performance
    - title: '🔒 Security'
      labels:
        - security
    - title: '📦 Build & CI'
      labels:
        - build
        - ci
    - title: '📝 Documentation'
      labels:
        - documentation
    - title: '🔧 Other Changes'
      labels:
        - '*'
